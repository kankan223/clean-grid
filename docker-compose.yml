services:
  # Frontend - Next.js 14
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_MAP_DEFAULT_LAT=40.7128
      - NEXT_PUBLIC_MAP_DEFAULT_LNG=-74.0060
      - NEXT_PUBLIC_MAP_DEFAULT_ZOOM=12
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Backend - FastAPI Core
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://cleangrid:cleangrid@db:5432/cleangrid
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=15
      - REFRESH_TOKEN_EXPIRE_DAYS=7
      - AI_SERVICE_URL=http://ai-service:8001
      - ORS_API_KEY=${ORS_API_KEY}
      - R2_ENDPOINT_URL=${R2_ENDPOINT_URL}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME}
      - NOMINATIM_BASE_URL=https://nominatim.openstreetmap.org/reverse
      - CORS_ORIGINS=http://localhost:3000,https://cleangrid.vercel.app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # AI Service - YOLOv8n Inference
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - YOLO_MODEL_PATH=/app/models/yolov8n.pt
      - YOLO_CONFIDENCE_THRESHOLD=0.45
      - MAX_IMAGE_SIZE=10485760  # 10MB in bytes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s  # Longer startup for model loading

  # Database - PostgreSQL 15 + PostGIS 3.3
  db:
    image: postgis/postgis:15-3.3
    container_name: cleangrid_db
    environment:
      - POSTGRES_DB=cleangrid
      - POSTGRES_USER=cleangrid
      - POSTGRES_PASSWORD=cleangrid
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cleangrid -d cleangrid"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Cache - Redis 7
  redis:
    image: redis:7-alpine
    container_name: cleangrid_redis
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

networks:
  default:
    name: cleangrid_network
